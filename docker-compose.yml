services:
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: orchestrator
    ports:
      - "8000:8000"
    depends_on:
      - emotion_hse
      - emotion_emotieff
      - asr_riva
    volumes:
      - ./data:/data
      - ./orchestrator/app/config:/app/app/config:ro
    environment:
      ACTIVE_EMOTION_MODEL: emotion_hse
      EMOTION_HSE_URL: http://emotion_hse:8001
      EMOTION_EMOTIEFF_URL: http://emotion_emotieff:8002

  emotion_hse:
    build:
      context: .
      dockerfile: services/emotion_hse/Dockerfile
    container_name: emotion_hse
    ports:
      - "8001:8001"

  emotion_emotieff:
    build:
      context: .
      dockerfile: services/emotion_emotieff/Dockerfile
    container_name: emotion_emotieff
    ports:
      - "8002:8002"

  asr_riva:
    build:
      context: .
      dockerfile: services/asr_riva/Dockerfile
    container_name: asr_riva
    ports:
      - "8003:8003"

  media_gateway:
    build:
      context: .
      dockerfile: services/media_gateway/Dockerfile
    container_name: media_gateway
    depends_on:
      - orchestrator
    ports:
      - "8010:8010"
    environment:
      MEDIA_GATEWAY_SIGNALING_HOST: ${HRI_SIGNALING_HOST}
      MEDIA_GATEWAY_SIGNALING_PORT: ${HRI_SIGNALING_PORT}
      MEDIA_GATEWAY_SIGNALING_USE_TLS: ${HRI_SIGNALING_USE_TLS}
      MEDIA_GATEWAY_ORCHESTRATOR_INGEST_URL: "http://orchestrator:8000/ingest/frame"
      MEDIA_GATEWAY_ORCHESTRATOR_AUDIO_INGEST_URL: "http://orchestrator:8000/ingest/audio"
      MEDIA_GATEWAY_AUDIO_CHUNK_MS: "1000"
      MEDIA_GATEWAY_AUDIO_SAMPLE_RATE_HZ: "16000"
      MEDIA_GATEWAY_AUDIO_CHANNELS: "1"
      # MEDIA_GATEWAY_VIDEO_STALL_TIMEOUT_SEC: "6.0"
      # MEDIA_GATEWAY_AUDIO_STALL_TIMEOUT_SEC: "8.0"
      # MEDIA_GATEWAY_RECONNECT_BACKOFF_SEC: "1.0"
      MEDIA_GATEWAY_DIAGNOSTIC_VIDEO_ONLY: "true"
      MEDIA_GATEWAY_ENABLE_VIDEO_FORWARDING: "true"
      MEDIA_GATEWAY_ENABLE_AUDIO_FORWARDING: "false"
      MEDIA_GATEWAY_VIDEO_STALL_TIMEOUT_SEC: "20.0"
      MEDIA_GATEWAY_RECONNECT_BACKOFF_SEC: "1.0"

  webrtc_signaling:
    build:
      context: .
      dockerfile: services/webrtc_signaling/Dockerfile
    container_name: webrtc_signaling
    ports:
      - "8443:8443"